<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ meta.desc if meta else 'Track carbon footprints in real-time, compute detailed usage across multiple categories, and discover custom mitigation solutions.' }}">
    <meta name="author" content="Arpit Ramesan">
    <title>{{ meta.title if meta else 'Carbon Footprint Awareness Platform' }}</title>
    
    <!-- Sprout Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css" />
    
    <!-- Core Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Ambient Wind Audio -->
    <audio id="bg-wind-audio" loop autoplay>
        <source src="{{ url_for('static', filename='wind.mp3') }}" type="audio/mpeg">
    </audio>

    <!-- Weather Dimming Overlay and Rain Canvas for Bad Weather Simulator -->
    <div id="weather-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -2; transition: background-color 1.2s ease; background-color: rgba(0,0,0,0);"></div>
    <canvas id="weather-rain-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1;"></canvas>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>Atmo Sync</span>
            </a>
            
            <ul class="nav-tabs" id="nav-tabs">
                <li>
                    <button class="tab-btn active" data-tab="dashboard">
                        <i class="fa-solid fa-chart-line"></i> Dashboard
                    </button>
                </li>
                <li>
                    <button class="tab-btn" data-tab="atmosphere">
                        <i class="fa-solid fa-cloud-sun-rain"></i> Atmosphere
                    </button>
                </li>
                <li>
                    <button class="tab-btn" data-tab="map-tab">
                        <i class="fa-solid fa-earth-americas"></i> Real-time Map
                    </button>
                </li>
                <li>
                    <button class="tab-btn" data-tab="calculator">
                        <i class="fa-solid fa-calculator"></i> Calculator
                    </button>
                </li>
                <li>
                    <button class="tab-btn" data-tab="solutions">
                        <i class="fa-solid fa-lightbulb"></i> Solutions
                    </button>
                </li>
                <li>
                    <button class="tab-btn" data-tab="learn">
                        <i class="fa-solid fa-graduation-cap"></i> Learn
                    </button>
                </li>
            </ul>
            
            <!-- Audio sound controller -->
            <div class="audio-control-group" style="display: flex; align-items: center; gap: 0.5rem; border: 1px solid rgba(5,150,105,0.2); background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(8px); padding: 0 10px; border-radius: 12px; height: 38px; transition: var(--transition);" title="Ambient Sound Controller">
                <i class="fa-solid fa-wind" style="color: var(--text-muted); font-size: 0.85rem;" title="Ambient Wind Sound"></i>
                <button id="sound-toggle-btn" class="tab-btn" style="border: none; background: transparent; padding: 0; display: flex; justify-content: center; align-items: center; width: 22px; height: 22px; cursor: pointer; border-radius: 50%;" title="Toggle Ambient Wind Sound">
                    <i class="fa-solid fa-volume-high" id="sound-icon" style="color: var(--accent);"></i>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.05" style="width: 60px; height: 4px; accent-color: var(--accent); cursor: pointer; border-radius: 2px; outline: none; border: none; background: rgba(5, 150, 105, 0.2); transition: var(--transition);" title="Adjust Volume">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div>
                &copy; 2026 Atmo Sync. All rights reserved.
            </div>
            
            <div class="footer-dev-links">
                <span>Developed by</span>
                <a href="{{ developer.github }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-github"></i> {{ developer.name }}
                </a>
                <span>|</span>
                <a href="{{ developer.linkedin }}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-linkedin"></i> LinkedIn
                </a>
            </div>
            
            <div class="footer-links">
                <a href="/privacy">Privacy Policy</a>
                <a href="/terms">Terms of Use</a>
            </div>
        </div>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Navigation JS -->
    <script>
        // --- WEATHER RAIN SIMULATOR CLASS ---
        class RainSimulator {
            constructor(canvas, overlay) {
                this.canvas = canvas;
                this.overlay = overlay;
                this.ctx = canvas.getContext('2d');
                this.drops = [];
                this.lightningChance = 0;
                this.rainIntensity = 0;
                this.speed = 0;
                this.wind = 0;
                this.fog = 0;
                this.width = 0;
                this.height = 0;
                this.isFlashing = false;
                this.activeMode = 'auto';
                
                this.audioVolFactor = 1.0;
                this.audioSpeedFactor = 1.0;
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.animate = this.animate.bind(this);
                requestAnimationFrame(this.animate);
            }
            
            resize() {
                this.width = this.canvas.width = window.innerWidth;
                this.height = this.canvas.height = window.innerHeight;
            }

            setMode(mode, footprint = null) {
                this.activeMode = mode;
                localStorage.setItem('weatherMode', mode);

                if (mode === 'auto') {
                    const fp = footprint !== null ? footprint : (parseFloat(localStorage.getItem('userCarbonFootprint')) || 0);
                    this.setIntensity(fp);
                    return;
                }
                
                // Clear any backdrop filters first
                this.overlay.style.backdropFilter = 'none';
                
                switch (mode) {
                    case 'clear':
                        this.rainIntensity = 0;
                        this.speed = 0;
                        this.wind = 0;
                        this.lightningChance = 0;
                        this.fog = 0;
                        this.audioVolFactor = 0.15;
                        this.audioSpeedFactor = 0.8;
                        // Warm golden sunny glow
                        this.overlay.style.backgroundColor = 'rgba(251, 243, 219, 0.12)';
                        break;
                    case 'windy':
                        this.rainIntensity = 0;
                        this.speed = 0;
                        this.wind = -3.5;
                        this.lightningChance = 0;
                        this.fog = 0;
                        this.audioVolFactor = 1.0;
                        this.audioSpeedFactor = 1.25;
                        // Fresh sky blue breeze tint
                        this.overlay.style.backgroundColor = 'rgba(219, 234, 254, 0.08)';
                        break;
                    case 'foggy':
                        this.rainIntensity = 15;
                        this.speed = 4;
                        this.wind = -0.15;
                        this.lightningChance = 0;
                        this.fog = 45;
                        this.audioVolFactor = 0.3;
                        this.audioSpeedFactor = 0.9;
                        // Misty white overlay with soft blur
                        this.overlay.style.backgroundColor = 'rgba(241, 245, 249, 0.42)';
                        this.overlay.style.backdropFilter = 'blur(2.5px)';
                        break;
                    case 'rain':
                        this.rainIntensity = 280;
                        this.speed = 22;
                        this.wind = -3;
                        this.lightningChance = 0;
                        this.fog = 20;
                        this.audioVolFactor = 0.75;
                        this.audioSpeedFactor = 1.05;
                        this.overlay.style.backgroundColor = 'rgba(28, 45, 36, 0.32)';
                        break;
                    case 'storm':
                        this.rainIntensity = 500;
                        this.speed = 28;
                        this.wind = -6;
                        this.lightningChance = 0.008;
                        this.fog = 35;
                        this.audioVolFactor = 1.25;
                        this.audioSpeedFactor = 1.35;
                        this.overlay.style.backgroundColor = 'rgba(15, 23, 42, 0.62)';
                        break;
                }
                this.updateAudioParameters();
                this.syncSliders();
            }
            
            setIntensity(footprint) {
                if (this.activeMode !== 'auto') return;

                // Clear backdrop blur first
                this.overlay.style.backdropFilter = 'none';

                if (footprint < 3.0) {
                    this.rainIntensity = 0;
                    this.speed = 0;
                    this.wind = 0;
                    this.lightningChance = 0;
                    this.fog = 0;
                    this.audioVolFactor = 0.15;
                    this.audioSpeedFactor = 0.8;
                    this.overlay.style.backgroundColor = 'rgba(0, 0, 0, 0)';
                } else if (footprint < 7.0) {
                    this.rainIntensity = 40;
                    this.speed = 10;
                    this.wind = -0.5;
                    this.lightningChance = 0;
                    this.fog = 10;
                    this.audioVolFactor = 0.45;
                    this.audioSpeedFactor = 0.95;
                    this.overlay.style.backgroundColor = 'rgba(28, 45, 36, 0.06)';
                } else if (footprint < 12.0) {
                    this.rainIntensity = 120;
                    this.speed = 16;
                    this.wind = -1.5;
                    this.lightningChance = 0;
                    this.fog = 20;
                    this.audioVolFactor = 0.75;
                    this.audioSpeedFactor = 1.05;
                    this.overlay.style.backgroundColor = 'rgba(28, 45, 36, 0.18)';
                } else if (footprint < 20.0) {
                    this.rainIntensity = 280;
                    this.speed = 22;
                    this.wind = -3;
                    this.lightningChance = 0.002;
                    this.fog = 30;
                    this.audioVolFactor = 1.0;
                    this.audioSpeedFactor = 1.2;
                    this.overlay.style.backgroundColor = 'rgba(28, 45, 36, 0.35)';
                } else {
                    this.rainIntensity = 480;
                    this.speed = 28;
                    this.wind = -5;
                    this.lightningChance = 0.008;
                    this.fog = 45;
                    this.audioVolFactor = 1.3;
                    this.audioSpeedFactor = 1.35;
                    this.overlay.style.backgroundColor = 'rgba(15, 23, 42, 0.58)';
                }
                this.updateAudioParameters();
                this.syncSliders();
            }

            setCustomParameters(rain, speed, wind, lightning, fog) {
                this.activeMode = 'custom';
                localStorage.setItem('weatherMode', 'custom');
                
                this.rainIntensity = parseFloat(rain);
                this.speed = parseFloat(speed);
                this.wind = parseFloat(wind);
                this.lightningChance = parseFloat(lightning);
                this.fog = parseFloat(fog);
                
                // update fog and color overlay
                if (this.fog > 0) {
                    this.overlay.style.backdropFilter = `blur(${this.fog * 0.05}px)`;
                    this.overlay.style.backgroundColor = `rgba(15, 23, 42, ${Math.max(0.1, this.fog * 0.0065)})`;
                } else {
                    this.overlay.style.backdropFilter = 'none';
                    if (this.rainIntensity > 0) {
                        this.overlay.style.backgroundColor = `rgba(28, 45, 36, ${Math.min(0.5, this.rainIntensity * 0.0012)})`;
                    } else {
                        this.overlay.style.backgroundColor = 'rgba(0, 0, 0, 0)';
                    }
                }
                
                // Dynamically modulate audio factors based on custom controls
                this.audioSpeedFactor = 0.8 + (Math.abs(this.wind) * 0.08);
                this.audioVolFactor = 0.15 + (Math.abs(this.wind) * 0.1) + (this.rainIntensity * 0.002) + (this.fog * 0.004);
                this.updateAudioParameters();
            }

            updateAudioParameters() {
                const audio = document.getElementById('bg-wind-audio');
                if (!audio) return;
                
                const rawVolume = parseFloat(localStorage.getItem('ambientVolume') || '0.05');
                const soundEnabled = localStorage.getItem('ambientSoundEnabled') !== 'false';
                
                audio.playbackRate = this.audioSpeedFactor || 1.0;
                if (!soundEnabled) {
                    audio.volume = 0;
                } else {
                    audio.volume = Math.min(1.0, rawVolume * (this.audioVolFactor || 1.0));
                }
            }

            syncSliders() {
                const rSlider = document.getElementById('sim-rain-intensity');
                const sSlider = document.getElementById('sim-rain-speed');
                const wSlider = document.getElementById('sim-wind-speed');
                const fSlider = document.getElementById('sim-fog-density');
                const lSlider = document.getElementById('sim-lightning-chance');
                
                const rVal = document.getElementById('sim-rain-intensity-val');
                const sVal = document.getElementById('sim-rain-speed-val');
                const wVal = document.getElementById('sim-wind-speed-val');
                const fVal = document.getElementById('sim-fog-density-val');
                const lVal = document.getElementById('sim-lightning-chance-val');

                if (rSlider) { rSlider.value = this.rainIntensity; if (rVal) rVal.textContent = Math.round(this.rainIntensity); }
                if (sSlider) { sSlider.value = this.speed; if (sVal) sVal.textContent = Math.round(this.speed) + ' px/s'; }
                if (wSlider) { wSlider.value = this.wind; if (wVal) wVal.textContent = parseFloat(this.wind).toFixed(1); }
                if (fSlider) { fSlider.value = this.fog; if (fVal) fVal.textContent = Math.round(this.fog) + '%'; }
                if (lSlider) { lSlider.value = Math.round(this.lightningChance * 5000); if (lVal) lVal.textContent = (this.lightningChance * 100).toFixed(2) + '%'; }
            }
            
            animate() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                if (this.lightningChance > 0 && Math.random() < this.lightningChance && !this.isFlashing) {
                    this.triggerLightning();
                }
                
                if (this.isFlashing) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    this.ctx.fillRect(0, 0, this.width, this.height);
                }
                
                if (this.rainIntensity > 0) {
                    while (this.drops.length < this.rainIntensity) {
                        this.drops.push({
                            x: Math.random() * (this.width + 200) - 100,
                            y: Math.random() * -this.height,
                            len: Math.random() * 15 + 10,
                            weight: Math.random() * 1.5 + 0.5,
                            opacity: Math.random() * 0.3 + 0.15
                        });
                    }
                    
                    if (this.drops.length > this.rainIntensity) {
                        this.drops.length = Math.round(this.rainIntensity);
                    }
                    
                    this.drops.forEach((drop) => {
                        drop.y += this.speed * drop.weight;
                        drop.x += this.wind * drop.weight;
                        
                        if (drop.y > this.height) {
                            drop.y = Math.random() * -100;
                            drop.x = Math.random() * (this.width + 200) - 100;
                        }
                        
                        this.ctx.beginPath();
                        this.ctx.strokeStyle = `rgba(163, 191, 250, ${drop.opacity})`;
                        this.ctx.lineWidth = drop.weight * 1.1;
                        this.ctx.lineCap = 'round';
                        this.ctx.moveTo(drop.x, drop.y);
                        this.ctx.lineTo(drop.x + (this.wind * 0.15), drop.y + drop.len);
                        this.ctx.stroke();
                    });
                } else {
                    this.drops = [];
                }
                
                requestAnimationFrame(this.animate);
            }
            
            triggerLightning() {
                this.isFlashing = true;
                this.playThunderSound();
                setTimeout(() => {
                    this.isFlashing = false;
                    setTimeout(() => {
                        if (Math.random() > 0.4) {
                            this.isFlashing = true;
                            setTimeout(() => {
                                this.isFlashing = false;
                            }, 50);
                        }
                    }, 60);
                }, 100);
            }

            playThunderSound() {
                const soundEnabled = localStorage.getItem('ambientSoundEnabled') !== 'false';
                const volume = parseFloat(localStorage.getItem('ambientVolume') || '0.05');
                if (!soundEnabled || volume === 0) return;

                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    
                    // Create noise buffer
                    const bufferSize = ctx.sampleRate * 2.5; 
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    // Generate brown noise
                    let lastOut = 0.0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        data[i] = (lastOut + (0.02 * white)) / 1.02;
                        lastOut = data[i];
                        data[i] *= 3.5; 
                    }
                    
                    const noiseNode = ctx.createBufferSource();
                    noiseNode.buffer = buffer;
                    
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(280, ctx.currentTime);
                    filter.Q.setValueAtTime(1, ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 2.0);
                    
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.001, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(volume * 1.5, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(volume * 0.4, ctx.currentTime + 0.3);
                    gain.gain.linearRampToValueAtTime(volume * 0.1, ctx.currentTime + 1.2);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
                    
                    noiseNode.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    
                    noiseNode.start(0);
                    noiseNode.stop(ctx.currentTime + 2.5);
                } catch (e) {
                    console.warn("Thunder synth failed: ", e);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Rain/Weather Simulator
            const rainCanvas = document.getElementById('weather-rain-canvas');
            const weatherOverlay = document.getElementById('weather-overlay');
            if (rainCanvas && weatherOverlay) {
                window.rainSimulator = new RainSimulator(rainCanvas, weatherOverlay);
                const savedMode = localStorage.getItem('weatherMode') || 'auto';
                window.rainSimulator.setMode(savedMode);
            }
            const tabs = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.tab-panel');

            // Tab Switching Logic
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;

                    // Update active button
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // Update active panel
                    panels.forEach(panel => {
                        if (panel.id === target) {
                            panel.classList.add('active');
                        } else {
                            panel.classList.remove('active');
                        }
                    });

                    // Trigger custom tabChanged event for Leaflet invalidation
                    const event = new Event('tabChanged');
                    document.dispatchEvent(event);
                });
            });

            // --- DRIFTING BACKGROUND CARBON ANIMATION ---
            function spawnBackgroundCO2() {
                if (!document.hasFocus()) return;

                const molecule = document.createElement('div');
                molecule.className = 'co2-molecule';
                
                // Randomly alternate between showing carbon compounds or smoke symbols
                const symbols = ['CO₂', 'CH₄', '💨', '🌫️', 'CO₂'];
                molecule.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Random position & scale starting coordinates
                const startX = Math.random() * 20 - 40; // Starts off-screen left
                const startY = Math.random() * 70 + 10; // Start at different heights
                
                molecule.style.left = `${startX}px`;
                molecule.style.top = `${startY}vh`;
                
                const scale = Math.random() * 0.7 + 0.6; // Elegant small scale
                molecule.style.fontSize = `${scale}rem`;
                
                // Custom random drift duration
                const duration = Math.random() * 12 + 18; // 18s to 30s
                molecule.style.animationDuration = `${duration}s`;
                
                document.body.appendChild(molecule);
                
                // Cleanup node
                setTimeout(() => {
                    molecule.remove();
                }, duration * 1000);
            }
            
            function triggerNextSpawn() {
                spawnBackgroundCO2();
                const nextInterval = Math.random() * 5000 + 4000; // Spawn every 4 to 9 seconds
                setTimeout(triggerNextSpawn, nextInterval);
            }
            
            triggerNextSpawn();

            // --- AUDIO CONTROLLER LOGIC ---
            const audio = document.getElementById('bg-wind-audio');
            const soundBtn = document.getElementById('sound-toggle-btn');
            const soundIcon = document.getElementById('sound-icon');
            const volumeSlider = document.getElementById('volume-slider');
            
            if (audio && soundBtn && soundIcon && volumeSlider) {
                // Initialize default values in localStorage if not set
                if (localStorage.getItem('ambientVolume') === null) {
                    localStorage.setItem('ambientVolume', '0.05');
                }
                if (localStorage.getItem('ambientSoundEnabled') === null) {
                    localStorage.setItem('ambientSoundEnabled', 'true');
                }
                
                // Load saved volume or default to 0.05
                let savedVolume = localStorage.getItem('ambientVolume');
                let ambientVolume = parseFloat(savedVolume);
                audio.volume = ambientVolume;
                volumeSlider.value = ambientVolume;
                
                // Retrieve or initialize explicit user choice
                let ambientEnabled = localStorage.getItem('ambientSoundEnabled') !== 'false';
                let isPlaying = false;
                
                // Helper to update the visual state of the audio controller
                function updateVisuals() {
                    if (!ambientEnabled || ambientVolume === 0) {
                        soundIcon.className = 'fa-solid fa-volume-xmark';
                        soundIcon.style.color = '';
                        soundBtn.style.background = 'transparent';
                    } else {
                        if (ambientVolume < 0.35) {
                            soundIcon.className = 'fa-solid fa-volume-low';
                        } else {
                            soundIcon.className = 'fa-solid fa-volume-high';
                        }
                        soundIcon.style.color = 'var(--accent)';
                        soundBtn.style.background = 'rgba(5, 150, 105, 0.08)';
                    }
                }
                
                updateVisuals();

                function toggleSound(e) {
                    if (e) {
                        e.stopPropagation(); // Prevent triggering document level click/interaction handler
                    }
                    
                    if (isPlaying) {
                        audio.pause();
                        isPlaying = false;
                        ambientEnabled = false;
                        localStorage.setItem('ambientSoundEnabled', 'false');
                        if (window.rainSimulator) window.rainSimulator.updateAudioParameters();
                    } else {
                        // If volume was set to 0, reset to default 0.05 to make it audible
                        if (ambientVolume === 0) {
                            ambientVolume = 0.05;
                            volumeSlider.value = ambientVolume;
                            localStorage.setItem('ambientVolume', '0.05');
                        }
                        
                        audio.play().then(() => {
                            isPlaying = true;
                            ambientEnabled = true;
                            localStorage.setItem('ambientSoundEnabled', 'true');
                            if (window.rainSimulator) window.rainSimulator.updateAudioParameters();
                            updateVisuals();
                        }).catch(err => {
                            console.log("Play blocked by browser policy. Interaction needed.");
                        });
                    }
                    updateVisuals();
                }
                
                function handleVolumeChange(e) {
                    ambientVolume = parseFloat(volumeSlider.value);
                    localStorage.setItem('ambientVolume', ambientVolume);
                    
                    if (ambientVolume === 0) {
                        if (isPlaying) {
                            audio.pause();
                            isPlaying = false;
                        }
                        ambientEnabled = false;
                        localStorage.setItem('ambientSoundEnabled', 'false');
                        if (window.rainSimulator) window.rainSimulator.updateAudioParameters();
                    } else {
                        ambientEnabled = true;
                        localStorage.setItem('ambientSoundEnabled', 'true');
                        // If it's not currently playing, try to play it
                        if (!isPlaying) {
                            audio.play().then(() => {
                                isPlaying = true;
                                if (window.rainSimulator) window.rainSimulator.updateAudioParameters();
                                updateVisuals();
                            }).catch(() => {});
                        } else {
                            if (window.rainSimulator) window.rainSimulator.updateAudioParameters();
                        }
                    }
                    updateVisuals();
                }
                
                soundBtn.addEventListener('click', toggleSound);
                volumeSlider.addEventListener('input', handleVolumeChange);
                volumeSlider.addEventListener('click', (e) => e.stopPropagation()); // Prevent document click bubbling
                
                // Play on first user interaction with the document (standard browser compliance)
                const startAudioOnInteract = () => {
                    // Only auto-play on interaction if the user hasn't explicitly disabled it and volume > 0
                    if (ambientEnabled && ambientVolume > 0 && !isPlaying) {
                        audio.play().then(() => {
                            isPlaying = true;
                            updateVisuals();
                            cleanupInteractListeners();
                        }).catch(() => {});
                    } else if (!ambientEnabled || ambientVolume === 0) {
                        // If explicitly disabled, clean up interaction listeners anyway
                        cleanupInteractListeners();
                    }
                };
                
                function cleanupInteractListeners() {
                    document.removeEventListener('click', startAudioOnInteract);
                    document.removeEventListener('keydown', startAudioOnInteract);
                }
                
                document.addEventListener('click', startAudioOnInteract);
                document.addEventListener('keydown', startAudioOnInteract);

                // Try to play immediately (in case browser autoplay is allowed)
                if (ambientEnabled && ambientVolume > 0) {
                    audio.play().then(() => {
                        isPlaying = true;
                        updateVisuals();
                        cleanupInteractListeners();
                    }).catch(() => {
                        // Safe to ignore, user interaction listener will trigger it
                    });
                }
            }

            // --- SWEEPING WIND STREAK GENERATOR ---
            function spawnWindStreak() {
                if (!document.hasFocus()) return;

                const streak = document.createElement('div');
                streak.className = 'wind-streak';
                
                const startY = Math.random() * 85 + 5; // Height between 5vh and 90vh
                streak.style.top = `${startY}vh`;
                
                const height = Math.random() * 2 + 1; // 1px to 3px thick
                streak.style.height = `${height}px`;
                
                let duration = Math.random() * 4 + 5; // 5s to 9s
                if (window.rainSimulator) {
                    const activeWind = Math.abs(window.rainSimulator.wind);
                    if (activeWind > 0) {
                        duration = Math.max(0.6, (Math.random() * 4 + 4) / (activeWind * 0.45));
                    }
                }
                streak.style.animationDuration = `${duration}s`;
                
                document.body.appendChild(streak);
                
                setTimeout(() => {
                    streak.remove();
                }, duration * 1000);
            }
            
            function triggerWindSpawn() {
                spawnWindStreak();
                let nextInterval = Math.random() * 4000 + 4000; // Spawn every 4 to 8 seconds
                if (window.rainSimulator) {
                    const activeWind = Math.abs(window.rainSimulator.wind);
                    if (activeWind > 0) {
                        nextInterval = Math.max(300, (Math.random() * 4000 + 4000) / (activeWind * 0.5));
                    }
                }
                setTimeout(triggerWindSpawn, nextInterval);
            }
            
            triggerWindSpawn();
        });
    </script>
