# Nginx Load Balancer and Reverse Proxy Configuration Template for Atmo Sync
# Place this in /etc/nginx/nginx.conf or /etc/nginx/sites-available/atmosync

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Upstream pool of Gunicorn application instances for request load balancing
    upstream atmosync_servers {
        # Direct requests to the instance with the least number of active connections
        least_conn; 
        
        server 127.0.0.1:5000 weight=3;
        # Add more backend server instances here to scale horizontally:
        # server 127.0.0.1:5001 weight=3;
        # server 127.0.0.1:5002 weight=3;
    }

    server {
        listen 80;
        server_name localhost;

        keepalive_timeout 65;

        # Offload static asset delivery directly to Nginx for maximum performance
        location /static/ {
            alias /var/www/atmosync/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Proxy client requests to the balanced upstream Gunicorn backend pool
        location / {
            proxy_pass http://atmosync_servers;
            proxy_http_version 1.1;
            
            # Send crucial headers to allow Flask to understand client proxies
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'keep-alive';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout configuration
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }
}
